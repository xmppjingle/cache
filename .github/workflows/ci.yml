name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp: ['25', '26', '27']
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.24'

      - name: Compile
        run: rebar3 compile

      - name: Run tests
        run: rebar3 eunit --cover

      - name: Cover report
        run: rebar3 cover

      - name: Generate Cobertura XML
        run: rebar3 covertool generate

      - name: Upload coverage to Codecov
        if: matrix.otp == '27'
        uses: codecov/codecov-action@v4
        with:
          files: _build/test/covertool/cache.covertool.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
